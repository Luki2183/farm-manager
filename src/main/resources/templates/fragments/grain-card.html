<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="PL">
<body>
<!--
    Fragment: grainCard(grain, hex)
    Square card showing the grain name, a colour swatch, and a hex input.
    Sits inside the wrapping <form> in settings.html.
-->
<div class="grain-card" th:fragment="grainCard(grain, hex)"
     th:style="'border-top: 5px solid ' + ${hex}">
    <div class="grain-card-swatch" th:style="'background-color:' + ${hex}"></div>
    <h3 class="grain-card-name"
        th:text="${#strings.capitalize(#strings.toLowerCase(grain)).replaceAll('_', ' ')}"></h3>
    <div class="field-group">
        <label th:for="'color-' + ${grain}">Color</label>
        <label>
            <input type="color"
                   class="color-picker"
                   th:id="'color-' + ${grain}"
                   th:name="${grain}"
                   th:value="${hex}"
                   required/>
        </label>
    </div>
</div>
</body>
</html>
