<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="PL">
<body>
    <div id="field-panel" th:fragment="fieldPanel">
        <div class="field-panel-container">
            <h2 class="panel-title">Field Details</h2>

            <div class="field-group">
                <label>Surface Area (ha)</label>
                <input type="number" id="surfaceArea" readonly />
            </div>

            <div class="field-group">
                <label>Grain Type</label>
                <select id="grainType">
                    <option value="">-- Select grain --</option>
                    <option value="wheat">Wheat</option>
                    <option value="corn">Corn</option>
                    <option value="barley">Barley</option>
                    <option value="rye">Rye</option>
                </select>
            </div>

            <div class="field-group">
                <label>Plant Date</label>
                <input type="date" id="plantDate" />
            </div>

            <div class="field-group">
                <label>Expected Harvest Date</label>
                <input type="date" id="expectedHarvestDate" />
            </div>

            <div class="field-group">
                <label>Humidity (%)</label>
                <input type="number" id="humidity" readonly />
            </div>

            <div class="field-group">
                <label>Wind Speed (km/h)</label>
                <input type="number" id="windSpeed" readonly />
            </div>

            <div class="field-group">
                <label>Field Color</label>
                <input type="color" id="fieldColor" />
            </div>
        </div>
    </div>
</body>
</html>
