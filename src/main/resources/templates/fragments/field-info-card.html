<div class="field-card" th:fragment="fieldCard(field)">

    <div class="field-card-container">

        <a class="show-map-btn"
           th:href="@{/{id}(id=${field.fieldId})}">
            Show on map
        </a>

        <!-- HEADER -->
        <h3 class="panel-title">
            <span th:text="'Field ' + ${field.fieldId}"></span>

            <!-- color dot -->
            <span class="field-color-dot"
                  th:style="'background-color:' + ${field.fieldColor}">
            </span>
        </h3>

        <!-- GRID -->
        <div class="field-grid">

            <div class="grid-item">
                <label>Surface</label>
                <span th:text="${field.surfaceArea} + ' ha'"></span>
            </div>

            <div class="grid-item">
                <label>Plant Date</label>
                <span th:text="${field.plantDate}"></span>
            </div>

            <div class="grid-item humidity-cell">
                <label>Humidity</label>

                <div class="humidity-circle"
                     th:style="'--value:' + (${field.humidity} > 100 ? 100 : ${field.humidity})">
                    <span th:text="${field.humidity} + '%'"></span>
                </div>
            </div>

            <div class="grid-item">
                <label>Grain</label>
                <span th:text="${field.grainType}"></span>
            </div>

            <div class="grid-item">
                <label>Harvest</label>
                <span th:text="${field.expectedHarvestDate}"></span>
            </div>

            <div class="grid-item">
                <label>Wind</label>
                <span th:text="${field.windSpeed} + ' m/s'"></span>
            </div>

        </div>

    </div>

</div>
