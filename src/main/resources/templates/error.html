<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="PL">
<head>
    <meta charset="UTF-8">
    <title>Error – FarmMap</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
</head>
<body>

<div th:replace="~{fragments/top-bar :: topBar}"></div>

<div id="error-container">
    <div class="error-card">

        <div class="error-code" th:text="${errorCode}">500</div>

        <h1 class="error-title" th:text="${errorTitle}">Unexpected Error</h1>

        <p class="error-message" th:text="${errorMessage}">
            Something went wrong. Please try again later.
        </p>

        <div class="error-actions">
            <a th:href="@{/}" class="panel-btn save-btn error-btn">Go to Map</a>
            <a th:href="@{/fieldsInfo}" class="panel-btn refresh-btn error-btn">All Fields</a>
        </div>

    </div>
</div>

</body>
</html>
