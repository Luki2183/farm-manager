spring.application.name=farmManager
spring.application.group=backend
server.port=8081
google.api.key=AIzaSyBAnerMBHAmyn78CmDVrfT7qnP8Cc1pG9M

spring.datasource.url=jdbc:h2:file:~/.farm-manager/db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

logging.level.root=info
logging.level.pl.luki2183.farmManager=debug
logging.level.org.zalando.logbook=trace
logging.pattern.console=%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([${spring.application.name:}]){blue} %clr([${spring.application.group:}]){blue} %clr([%15.15t]){faint} %clr([%X{correlationId:-}]){cyan} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}

logbook.filter.enabled=true
logbook.format.style=json
logbook.minimum-status=200
logbook.obfuscate.headers=Authorization,X-Api-Key

spring.mvc.hiddenmethod.filter.enabled=true